name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Haxe 4.3.7
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: "4.3.7"

      - name: 安装 hxnodejs 依赖
        run: haxelib install hxnodejs

      - name: 注册 haxe-rsa 开发库
        run: haxelib dev haxe-rsa .

      - name: 测试密钥生成
        run: |
          OUTPUT=$(haxelib run haxe-rsa create)
          echo "$OUTPUT"

          # 校验输出包含 PEM 格式标记
          if ! echo "$OUTPUT" | grep -q "BEGIN PUBLIC KEY"; then
            echo "错误: 输出中未找到公钥 PEM 头"
            exit 1
          fi
          if ! echo "$OUTPUT" | grep -q "BEGIN PRIVATE KEY"; then
            echo "错误: 输出中未找到私钥 PEM 头"
            exit 1
          fi

          echo ""
          echo "密钥生成测试通过"
