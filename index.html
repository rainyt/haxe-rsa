<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>haxe-ras 浏览器测试</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
    background: #1a1a2e; color: #e0e0e0;
    min-height: 100vh; padding: 24px;
  }
  h1 { font-size: 22px; color: #7ec8e3; margin-bottom: 8px; }
  .subtitle { color: #888; font-size: 13px; margin-bottom: 24px; }
  #log {
    background: #0d0d1a; border-radius: 8px;
    padding: 16px; min-height: 300px;
    font-size: 13px; line-height: 1.7;
    white-space: pre-wrap; word-break: break-all;
    max-height: 70vh; overflow-y: auto;
  }
  .line { border-bottom: 1px solid #1a1a30; padding: 2px 0; }
  .ok { color: #4caf50; }
  .fail { color: #f44336; }
  .info { color: #7ec8e3; }
  .warn { color: #ff9800; }
  .err { color: #f44336; font-weight: bold; }
  .status { margin-top: 16px; font-size: 14px; }
  .running { color: #ff9800; }
  .passed { color: #4caf50; }
</style>
</head>
<body>

<h1>haxe-ras — 浏览器 RSA 测试</h1>
<div class="subtitle">Web Crypto API · RSA-OAEP + RSASSA-PKCS1-v1_5 · JWK 密钥格式</div>
<div id="log"></div>
<div id="status" class="status running">⏳ 运行中...</div>

<script>
  var logEl = document.getElementById('log');
  var statusEl = document.getElementById('status');
  var failures = 0;
  var total = 0;

  function addLine(text, cls) {
    var div = document.createElement('div');
    div.className = 'line ' + (cls || '');
    div.textContent = text;
    logEl.appendChild(div);
    logEl.scrollTop = logEl.scrollHeight;
  }

  // 拦截 trace / console.log 输出到页面
  var _log = console.log;
  console.log = function() {
    var args = Array.prototype.slice.call(arguments);
    var msg = args.join(' ');
    _log.apply(console, args);

    if (msg.indexOf('[OK]') === 0) {
      total++;
      addLine(msg, 'ok');
    } else if (msg.indexOf('[FAIL]') === 0 || msg.indexOf('[ERROR]') === 0) {
      total++;
      failures++;
      addLine(msg, 'fail');
    } else if (msg.indexOf('===') === 0) {
      addLine(msg, 'info');
    } else {
      addLine(msg, '');
    }
  };

  var _error = console.error;
  console.error = function() {
    var args = Array.prototype.slice.call(arguments);
    var msg = args.join(' ');
    _error.apply(console, args);
    failures++;
    total++;
    addLine('[ERROR] ' + msg, 'err');
  };

  // 加载测试脚本
  window.onerror = function(msg) {
    addLine('[FATAL] ' + msg, 'err');
    statusEl.textContent = '❌ 加载失败 — 请确认已执行 haxe test.js.hxml 编译';
    statusEl.className = 'status fail';
  };
</script>

<script>
  // 页面加载后延迟执行测试（确保 Web Crypto 可用）
  window.addEventListener('DOMContentLoaded', function() {
    if (!window.crypto || !window.crypto.subtle) {
      addLine('[FATAL] 浏览器不支持 Web Crypto API', 'err');
      statusEl.textContent = '❌ 浏览器不支持 — 请使用 Chrome / Firefox / Safari 最新版';
      statusEl.className = 'status fail';
      return;
    }
    addLine('浏览器: ' + navigator.userAgent, 'info');
    addLine('Web Crypto: 可用', 'ok');
    addLine('');
  });
</script>

<script src="test.browser.js"></script>

<script>
  // 测试脚本执行完毕后更新状态
  window.addEventListener('load', function() {
    setTimeout(function() {
      if (failures === 0 && total > 0) {
        statusEl.textContent = '✅ 全部通过 (' + total + ' 项测试)';
        statusEl.className = 'status passed';
      } else if (total > 0) {
        statusEl.textContent = '❌ ' + failures + '/' + total + ' 项失败';
        statusEl.className = 'status fail';
      }
    }, 500);
  });
</script>

</body>
</html>
